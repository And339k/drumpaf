<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mind Pad</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
</head>
<body>

<div class="machine">

    <div class="left">
        <div class="screen">
            <h2>MIND PAD</h2>
        </div>

        <div class="controls">
            <div class="knob"></div>
            <div class="knob"></div>
            <div class="knob"></div>
        </div>
    </div>

    <div class="canvas">
        <div class="pad p1"></div>
        <div class="pad p2"></div>
        <div class="pad p3"></div>
        <div class="pad p4"></div>

        <div class="pad p5"></div>
        <div class="pad p6"></div>
        <div class="pad p7"></div>
        <div class="pad p8"></div>

        <div class="pad p9"></div>
        <div class="pad p10"></div>
        <div class="pad p11"></div>
        <div class="pad p12"></div>
    </div>

</div>

</body>
</html>
