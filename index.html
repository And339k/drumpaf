<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <title>Mind Pad</title>
   <link rel="stylesheet" href="style.css">


   <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
</head>
<body>


<div class="machine">


   <!-- LEFT PANEL -->
   <div class="left">


       <div class="screen">
           <h2>MIND PAD</h2>
           <p>// drifting / fragments / sound memory //</p>
           <span>active: echo_memory.wav</span>
       </div>


       <div class="controls">
           <div class="knob"></div>
           <div class="knob"></div>
           <div class="knob"></div>
       </div>


       <div class="library">
           <p>fragments</p>
           <ul>
               <li>voice_cut.wav</li>
               <li>loop_fragment.wav</li>
               <li>static_field.wav</li>
               <li>breath_noise.wav</li>
           </ul>
       </div>


   </div>


   <!-- RIGHT: MIND SPACE -->
   <div class="canvas">


       <div class="pad p1">echo</div>
       <div class="pad p2">///</div>
       <div class="pad p3">drift</div>
       <div class="pad p4">frag</div>


       <div class="pad p5">noise</div>
       <div class="pad p6">loop</div>
       <div class="pad p7">...</div>
       <div class="pad p8">shift</div>


       <div class="pad p9">void</div>
       <div class="pad p10">pulse</div>
       <div class="pad p11">glitch</div>
       <div class="pad p12">trace</div>


   </div>


</div>


</body>
</html>
