<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Sampler</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="device">

  <!-- TOP SCREEN -->
  <div class="top-bar">
    <div class="brand">SAMPLER X1</div>
    <div class="status">KIT: BASIC DRUMS</div>
  </div>

  <div class="screen">
    <p>READY • PRESS PAD</p>
  </div>

  <!-- PAD GRID -->
  <div class="grid">

    <!-- ROW 1 -->
    <button class="pad">
      Q
      <audio src="sounds/kick.wav"></audio>
      <span>KICK</span>
    </button>

    <button class="pad">
      W
      <audio src="sounds/snare.wav"></audio>
      <span>SNARE</span>
    </button>

    <button class="pad">
      E
      <audio src="sounds/hihat.wav"></audio>
      <span>HAT</span>
    </button>

    <button class="pad">
      R
      <audio src="sounds/clap.wav"></audio>
      <span>CLAP</span>
    </button>

    <!-- ROW 2 -->
    <button class="pad">
      A
      <audio src="sounds/tom1.wav"></audio>
      <span>TOM 1</span>
    </button>

    <button class="pad">
      S
      <audio src="sounds/tom2.wav"></audio>
      <span>TOM 2</span>
    </button>

    <button class="pad">
      D
      <audio src="sounds/tom3.wav"></audio>
      <span>TOM 3</span>
    </button>

    <button class="pad">
      F
      <audio src="sounds/ride.wav"></audio>
      <span>RIDE</span>
    </button>

    <!-- ROW 3 -->
    <button class="pad">
      Z
      <audio src="sounds/crash.wav"></audio>
      <span>CRASH</span>
    </button>

    <button class="pad">
      X
      <audio src="sounds/shaker.wav"></audio>
      <span>SHAKER</span>
    </button>

    <button class="pad">
      C
      <audio src="sounds/bass.wav"></audio>
      <span>BASS</span>
    </button>

    <button class="pad">
      V
      <audio src="sounds/fx.wav"></audio>
      <span>FX</span>
    </button>

  </div>

  <!-- INFO STRIP -->
  <div class="info">
    <div>VOLUME: 100%</div>
    <div>BPM: 120</div>
    <div>MODE: LIVE</div>
  </div>

</div>

</body>
</html>
